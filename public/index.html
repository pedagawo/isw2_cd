<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab06 API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        .status {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1f2937;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .version {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .timestamp {
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="status" id="status">Cargando...</span>
        <h1 id="message">-</h1>
        <p class="version" id="version"></p>
        <p class="timestamp" id="timestamp"></p>
    </div>

    <script>
        async function loadData() {
            try {
                const [apiRes, healthRes] = await Promise.all([
                    fetch('/api'),
                    fetch('/health')
                ]);
                const api = await apiRes.json();
                const health = await healthRes.json();

                document.getElementById('status').textContent = health.status.toUpperCase();
                document.getElementById('message').textContent = api.message;
                document.getElementById('version').textContent = `Version ${api.version}`;
                document.getElementById('timestamp').textContent = new Date(health.timestamp).toLocaleString();
            } catch (err) {
                document.getElementById('status').textContent = 'ERROR';
                document.getElementById('status').style.background = '#ef4444';
            }
        }
        loadData();
    </script>
</body>
</html>
