name: Lab02 — CD Pipeline

# DISPARADOR: El pipeline solo se activa en push a main
# Los desarrolladores trabajan en ramas feature/* sin interferencia
on:
  push:
    branches: [ main ]

jobs:

  # ========================================================
  # JOB 1: PRUEBAS — Siempre corre primero
  # ========================================================
  test:
    name: Ejecutar Pruebas Unitarias
    runs-on: ubuntu-latest
    steps:

      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'          # Cachea node_modules entre builds

      - name: Instalar dependencias
        run: npm ci             # Reproducible: usa package-lock.json exacto

      - name: Correr pruebas con Jest
        run: npm test

  # ========================================================
  # JOB 2: DEPLOY — Solo corre si las pruebas pasaron
  # ========================================================
  deploy:
    name: Desplegar en Render.com
    runs-on: ubuntu-latest
    needs: test              # <- DEPENDENCIA de "test"
    if: github.ref == 'refs/heads/main'
    steps:

      - name: Desencadenar despliegue en Render
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy iniciado para servicio: ${{ secrets.RENDER_SERVICE_ID }}"

      - name: Esperar que Render complete el deploy
        run: sleep 90

      - name: Verificar que la app responde en PRD
        run: |
          for i in 1 2 3; do
            curl --fail -s https://isw2-cd.onrender.com/health && exit 0
            echo "Intento $i fallido, reintentando en 10s..."
            sleep 10
          done
          exit 1

      - name: Notificar exito
        if: success()
        run: echo 'Deploy exitoso en produccion'

      - name: Notificar fallo
        if: failure()
        run: echo 'El deploy fallo. Revisar logs.'
